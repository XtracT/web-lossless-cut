version: '3.8'

services:
  weblosslesscut:
    image: ghcr.io/xtract/web-lossless-cut:main
    container_name: web-lossless-cut
    ports:
      - "3001:3001"
    volumes:
      - /mnt/fastpool/dji:/input
      - ./output:/output
      # Subfolder example for separate media libraries:
      # - /nas/camera-videos:/input/camera
      # - /nas/kids-music:/input/music
      # - /nas/output-videos:/output/camera
      # - /nas/output-music:/output/music
    restart: unless-stopped
